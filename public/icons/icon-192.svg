<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <g transform="translate(96,96)" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Music notes / staff lines -->
    <line x1="-40" y1="-20" x2="40" y2="-20" opacity="0.4"/>
    <line x1="-40" y1="-8" x2="40" y2="-8" opacity="0.4"/>
    <line x1="-40" y1="4" x2="40" y2="4" opacity="0.4"/>
    <!-- Note 1 -->
    <ellipse cx="-20" cy="-8" rx="8" ry="6" fill="white"/>
    <line x1="-12" y1="-8" x2="-12" y2="-36"/>
    <!-- Note 2 -->
    <ellipse cx="10" cy="4" rx="8" ry="6" fill="white"/>
    <line x1="18" y1="4" x2="18" y2="-24"/>
    <!-- Beam -->
    <line x1="-12" y1="-36" x2="18" y2="-24" stroke-width="4"/>
    <!-- Calendar hint -->
    <rect x="-36" y="20" width="72" height="36" rx="6" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    <line x1="-24" y1="20" x2="-24" y2="12" stroke-width="4" opacity="0.6"/>
    <line x1="24" y1="20" x2="24" y2="12" stroke-width="4" opacity="0.6"/>
    <line x1="-36" y1="32" x2="36" y2="32" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
